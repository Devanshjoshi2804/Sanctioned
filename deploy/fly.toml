# Fly.io config for the sanctioned API. Run `fly launch --copy-config --no-deploy`
# once to claim an app name/region, then `fly deploy`.

app = "sanctioned-api"
primary_region = "sin"  # Singapore — close to India; change as needed.

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  hard_limit = 200
  soft_limit = 150

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "2s"

[env]
  PORT = "8000"
