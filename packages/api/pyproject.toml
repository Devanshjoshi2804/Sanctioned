# The HTTP API — a thin FastAPI layer over the engine library.
#
# This package contains NO business rules. It validates requests, calls the
# engine, and serialises responses. Everything substantive lives in `sanctioned`.

[project]
name = "sanctioned-api"
version = "0.1.0"
description = "FastAPI service exposing the sanctioned matching engine."
requires-python = ">=3.12"
dependencies = [
    "sanctioned",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sanctioned_api"]
