# The ops copilot — retrieval-augmented Q&A grounded in the policy registry and
# runbook. It answers ONLY from retrieved sources, with citations, and never from
# the model's own knowledge.
#
# Backends are pluggable: an offline TF-IDF retriever + extractive answerer (the
# default, used in CI with no keys) and a Gemini-backed retriever/answerer that
# activates when GEMINI_API_KEY is set.

[project]
name = "sanctioned-copilot"
version = "0.1.0"
description = "Retrieval-augmented ops copilot over the sanctioned policy registry."
requires-python = ">=3.12"
dependencies = [
    "sanctioned",
    "google-genai>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sanctioned_copilot"]
